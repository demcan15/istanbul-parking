name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── 1. Test ───────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Testleri çalıştır
        run: pytest tests/ -v
        env:
          # Python'ın 'app' klasörünü bulabilmesi için kesin konum tarifi eklendi
          PYTHONPATH: ${{ github.workspace }}

  # ── 2. Lint ───────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff black
      - run: ruff check app/ ml/ || echo "Lint uyarıları pas geçildi"
      - run: black --check app/ ml/ || echo "Formatlama uyarıları pas geçildi"

  # ── 3. Docker Build ───────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx kur
        uses: docker/setup-buildx-action@v3

      - name: GCP kimlik doğrula
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloud kur
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker'ı Artifact Registry için yapılandır
        run: |
          gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: API image build et ve push et
        run: |
          docker build \
            -t europe-west1-docker.pkg.dev/istanbul-parking-2026-ad/istanbul-parking/api:latest \
            -t europe-west1-docker.pkg.dev/istanbul-parking-2026-ad/istanbul-parking/api:${{ github.sha }} \
            -f Dockerfile.api .
          docker push europe-west1-docker.pkg.dev/istanbul-parking-2026-ad/istanbul-parking/api:latest
          docker push europe-west1-docker.pkg.dev/istanbul-parking-2026-ad/istanbul-parking/api:${{ github.sha }}

      - name: Frontend image build et ve push et
        run: |
          docker build \
            -t europe-west1-docker.pkg.dev/istanbul-parking-2026-ad/istanbul-parking/frontend:latest \
            -t europe-west1-docker.pkg.dev/istanbul-parking-2026-ad/istanbul-parking/frontend:${{ github.sha }} \
            -f frontend/Dockerfile.frontend .
          docker push europe-west1-docker.pkg.dev/istanbul-parking-2026-ad/istanbul-parking/frontend:latest
          docker push europe-west1-docker.pkg.dev/istanbul-parking-2026-ad/istanbul-parking/frontend:${{ github.sha }}

  # ── 4. Deploy (sadece main branch) ───────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: GCP kimlik doğrula
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: gcloud kur
        uses: google-github-actions/setup-gcloud@v2

      - name: API'yi Cloud Run'a deploy et
        run: |
          gcloud run deploy parking-api \
            --image europe-west1-docker.pkg.dev/istanbul-parking-2026-ad/istanbul-parking/api:${{ github.sha }} \
            --region europe-west1 \
            --platform managed \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --max-instances 3 \
            --min-instances 0 \
            --set-env-vars="DB_HOST=${{ secrets.DB_HOST }},DB_NAME=parking_db,DB_USER=parking_user,DB_PASSWORD=${{ secrets.DB_PASSWORD }},REDIS_HOST=${{ secrets.REDIS_HOST }}" \
            --allow-unauthenticated \
            --quiet

      - name: Frontend'i Cloud Run'a deploy et
        run: |
          gcloud run deploy parking-frontend \
            --image europe-west1-docker.pkg.dev/istanbul-parking-2026-ad/istanbul-parking/frontend:${{ github.sha }} \
            --region europe-west1 \
            --platform managed \
            --port 8080 \
            --memory 256Mi \
            --timeout 300 \
            --max-instances 2 \
            --min-instances 0 \
            --allow-unauthenticated \
            --quiet

      - name: Deploy URL'lerini yazdır
        run: |
          echo "✅ Deploy tamamlandı!"
          API_URL=$(gcloud run services describe parking-api --region europe-west1 --format 'value(status.url)')
          FRONTEND_URL=$(gcloud run services describe parking-frontend --region europe-west1 --format 'value(status.url)')
          echo "🔗 API: $API_URL"
          echo "🌍 Frontend: $FRONTEND_URL"