name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Test ───────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Testleri çalıştır
        run: pytest tests/ -v

  # ── 2. Lint ───────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff black
      - run: ruff check app/ ml/
      - run: black --check app/ ml/

  # ── 3. Docker build ───────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx kur
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub'a giriş yap
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: API image'ı build et ve push et
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/istanbul-parking-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/istanbul-parking-api:${{ github.sha }}

  # ── 4. Deploy (sadece main branch) ───────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy bilgisi
        run: |
          echo "✅ Image push edildi"
          echo "🚀 GCP Cloud Run deployment sonraki adımda"